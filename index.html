<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM FIGHTER - Hand-Controlled Space Shooter</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', cursive;
            color: #00ff00;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5), inset 0 0 30px rgba(0, 255, 0, 0.1);
            background: #000;
            filter: drop-shadow(0 0 20px rgba(0, 255, 0, 0.3));
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: url(#scanlines);
            image-rendering: pixelated;
        }

        #introPopup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0a2e;
            border: 4px solid #00ff00;
            padding: 30px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.7);
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #introPopup h1 {
            font-size: 24px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 20px;
        }

        #introPopup .controls {
            text-align: left;
            font-size: 12px;
            line-height: 1.8;
            color: #ffff00;
        }

        #introPopup .control-line {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }

        #introPopup .gesture-icon {
            min-width: 80px;
        }

        #startButton {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            color: #000;
            border: 2px solid #00ff00;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
            transition: all 0.3s;
            margin-top: 20px;
        }

        #startButton:hover {
            box-shadow: 0 0 40px rgba(0, 255, 255, 1);
            transform: scale(1.05);
        }

        #startButton:active {
            transform: scale(0.98);
        }

        #gameOverOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            display: none;
            flex-direction: column;
            gap: 30px;
        }

        #gameOverContent {
            text-align: center;
            background: #0a0a2e;
            border: 4px solid #ff0000;
            padding: 40px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
        }

        #gameOverContent h1 {
            font-size: 32px;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 20px;
        }

        #gameOverContent p {
            font-size: 16px;
            color: #ffff00;
            margin: 10px 0;
        }

        #gameOverContent .score-display {
            font-size: 20px;
            color: #00ff00;
            margin: 20px 0;
        }

        #playAgainButton {
            background: linear-gradient(45deg, #ff0000, #ff6600);
            color: #fff;
            border: 2px solid #ff0000;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            transition: all 0.3s;
            margin-top: 20px;
        }

        #playAgainButton:hover {
            box-shadow: 0 0 40px rgba(255, 100, 0, 1);
            transform: scale(1.05);
        }

        svg {
            display: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <svg>
        <defs>
            <filter id="scanlines">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.5" />
            </filter>
        </defs>
    </svg>

    <div id="introPopup">
        <h1>⚡ PHANTOM FIGHTER ⚡</h1>
        <div style="font-size: 14px; color: #00ffff; text-shadow: 0 0 5px #00ffff; margin-bottom: 10px;">HAND GESTURE CONTROLS</div>

        <div class="controls">
            <div class="control-line">
                <span class="gesture-icon">✊ FIST</span>
                <span>→ MOVE ONLY</span>
            </div>
            <div class="control-line">
                <span class="gesture-icon">☝ 1 FINGER</span>
                <span>→ VULCAN GUN</span>
            </div>
            <div style="font-size: 10px; color: #888; margin-left: 80px;">(unlimited bullets)</div>

            <div class="control-line" style="margin-top: 15px;">
                <span class="gesture-icon">✌ 2 FINGERS</span>
                <span>→ INFERNO FLAMER</span>
            </div>
            <div style="font-size: 10px; color: #888; margin-left: 80px;">(collect boost first)</div>

            <div class="control-line" style="margin-top: 15px;">
                <span class="gesture-icon">🤟 3 FINGERS</span>
                <span>→ NOVA BOMB</span>
            </div>
            <div style="font-size: 10px; color: #888; margin-left: 80px;">(collect boost first)</div>

            <div style="margin-top: 20px; font-size: 12px; border-top: 2px solid #00ff00; padding-top: 15px; color: #00ff00;">
                MOVE HAND LEFT/RIGHT = SHIP MOVEMENT
            </div>
        </div>

        <button id="startButton">ALLOW CAMERA & START</button>
    </div>

    <div id="gameOverOverlay">
        <div id="gameOverContent">
            <h1>GAME OVER</h1>
            <p id="finalScore">SCORE: 0</p>
            <p id="finalLevel">LEVEL: 1</p>
            <div class="score-display" id="highScoreDisplay"></div>
            <button id="playAgainButton">PLAY AGAIN</button>
        </div>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        // ============================================
        // GAME CONSTANTS AND STATE
        // ============================================
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const HUD_HEIGHT = 40;
        const BOTTOM_HUD_HEIGHT = 80;
        const GAME_AREA_TOP = HUD_HEIGHT;
        const GAME_AREA_BOTTOM = CANVAS_HEIGHT - BOTTOM_HUD_HEIGHT;
        const GAME_AREA_HEIGHT = GAME_AREA_BOTTOM - GAME_AREA_TOP;

        const GAME_STATES = {
            INTRO: 'INTRO',
            PLAYING: 'PLAYING',
            PAUSED: 'PAUSED',
            LEVEL_COMPLETE: 'LEVEL_COMPLETE',
            GAME_OVER: 'GAME_OVER',
            VICTORY: 'VICTORY'
        };

        const MAX_LEVEL = 5;

        const WEAPONS = {
            VULCAN: 0,
            INFERNO: 1,
            NOVA: 2
        };

        const GESTURE_NONE = 0;
        const GESTURE_ONE = 1;
        const GESTURE_TWO = 2;
        const GESTURE_THREE = 3;

        let gameState = {
            currentState: GAME_STATES.INTRO,
            score: 0,
            level: 1,
            lives: 3,
            shieldHealth: 3,
            maxShield: 3,
            wave: 0,
            maxWaves: 3,

            playerX: CANVAS_WIDTH / 2,
            playerY: CANVAS_HEIGHT - BOTTOM_HUD_HEIGHT - 40,
            playerWidth: 32,
            playerHeight: 40,

            bullets: [],
            enemies: [],
            particles: [],
            boosts: [],

            currentWeapon: WEAPONS.VULCAN,
            vulcanAmmo: Infinity,
            infernoActive: false,
            infernoFuel: 8,
            infernoMaxFuel: 8,
            novaActive: false,
            novaBombs: 0,
            novaMaxBombs: 3,

            lastFireTime: 0,
            fireRate: 0.125,

            handState: { x: 0, y: 0, detected: false, gesture: GESTURE_NONE },

            screenShake: 0,
            shakeIntensity: 0,

            highScore: localStorage.getItem('phantomFighterHighScore') || 0,
            levelStartTime: 0,
            levelCompleteFlashTime: 0,

            cameraStarted: false,
            audioContext: null,

            cityScrollPos: 0,

            wavePending: false,
            invincible: false,
            respawnTimer: 0,
            playAgainBtn: null,

            infernoBeamActive: false,
            explosionZones: []
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function distance(x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function circleCollision(c1x, c1y, c1r, c2x, c2y, c2r) {
            return distance(c1x, c1y, c2x, c2y) < (c1r + c2r);
        }

        function rectCollision(r1x, r1y, r1w, r1h, r2x, r2y, r2w, r2h) {
            return r1x < r2x + r2w && r1x + r1w > r2x &&
                   r1y < r2y + r2h && r1y + r1h > r2y;
        }

        // ============================================
        // AUDIO FUNCTIONS
        // ============================================
        function initAudio() {
            if (!gameState.audioContext) {
                gameState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function beep(freq, duration, type = 'square') {
            if (!gameState.audioContext) return;
            const ctx = gameState.audioContext;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + duration);
        }

        function playFireSound() { beep(880, 0.05); }
        function playExplosionSound() {
            beep(80, 0.3, 'sawtooth');
            setTimeout(() => beep(120, 0.2, 'sawtooth'), 50);
        }
        function playPowerUpSound() {
            beep(523, 0.1);
            setTimeout(() => beep(659, 0.1), 100);
            setTimeout(() => beep(784, 0.15), 200);
        }
        function playHitSound() { beep(220, 0.4, 'sawtooth'); }

        // ============================================
        // HAND TRACKING WITH MEDIAPIPE
        // ============================================
        const camera = new Camera(document.createElement('video'), {
            onFrame: async () => {
                if (!gameState.cameraStarted) return;
                await hands.send({ image: camera.video });
            },
            width: 320,
            height: 240
        });

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                gameState.handState.detected = true;
                gameState.handState.gesture = detectGesture(landmarks);
                gameState.handState.landmarks = landmarks;

                // Map wrist position to ship X (flip for mirror)
                const wristX = landmarks[0].x;
                const mappedX = (1 - wristX) * CANVAS_WIDTH;
                gameState.handState.x = Math.max(0, Math.min(CANVAS_WIDTH, mappedX));
            } else {
                gameState.handState.detected = false;
            }
        });

        function isFingerExtended(landmarks, tipIdx, mcpIdx) {
            return landmarks[tipIdx].y < landmarks[mcpIdx].y - 0.05;
        }

        function detectGesture(landmarks) {
            const index = isFingerExtended(landmarks, 8, 5);
            const middle = isFingerExtended(landmarks, 12, 9);
            const ring = isFingerExtended(landmarks, 16, 13);
            const pinky = isFingerExtended(landmarks, 20, 17);

            if (index && !middle && !ring && !pinky) return GESTURE_ONE;
            if (index && middle && !ring && !pinky) return GESTURE_TWO;
            if (index && middle && ring && !pinky) return GESTURE_THREE;
            return GESTURE_NONE;
        }

        // ============================================
        // GAME INITIALIZATION
        // ============================================
        function startCamera() {
            camera.start();
            gameState.cameraStarted = true;
            startGame();
        }

        function startGame() {
            gameState.currentState = GAME_STATES.PLAYING;
            gameState.score = 0;
            gameState.level = 1;
            gameState.lives = 3;
            gameState.shieldHealth = 3;
            gameState.wave = 0;
            gameState.maxWaves = 3;
            gameState.playerX = CANVAS_WIDTH / 2;
            gameState.bullets = [];
            gameState.enemies = [];
            gameState.particles = [];
            gameState.boosts = [];
            gameState.infernoActive = false;
            gameState.novaActive = false;
            gameState.levelStartTime = Date.now();
            gameState.currentWeapon = WEAPONS.VULCAN;
            gameState.wavePending = false;
            gameState.invincible = false;
            gameState.respawnTimer = 0;
            gameState.playAgainBtn = null;
            gameState.infernoBeamActive = false;
            gameState.explosionZones = [];

            document.getElementById('introPopup').classList.add('hidden');
            initAudio();

            spawnWave();
        }

        function resetGame() {
            gameState.currentState = GAME_STATES.PLAYING;
            gameState.score = 0;
            gameState.level = 1;
            gameState.lives = 3;
            gameState.shieldHealth = 3;
            gameState.wave = 0;
            gameState.maxWaves = 3;
            gameState.playerX = CANVAS_WIDTH / 2;
            gameState.bullets = [];
            gameState.enemies = [];
            gameState.particles = [];
            gameState.boosts = [];
            gameState.infernoActive = false;
            gameState.novaActive = false;
            gameState.levelStartTime = Date.now();
            gameState.currentWeapon = WEAPONS.VULCAN;
            gameState.wavePending = false;
            gameState.invincible = false;
            gameState.respawnTimer = 0;
            gameState.playAgainBtn = null;
            gameState.infernoBeamActive = false;
            gameState.explosionZones = [];

            spawnWave();
        }

        // ============================================
        // SPAWNING FUNCTIONS
        // ============================================
        function spawnWave() {
            gameState.wave++;

            const enemyCount = 8 + gameState.level * 2;

            for (let i = 0; i < enemyCount; i++) {
                setTimeout(() => {
                    const rand = Math.random();
                    let enemy;

                    if (gameState.level === 1) {
                        enemy = spawnGrunt();
                    } else if (gameState.level === 2) {
                        if (rand < 0.5) enemy = spawnGrunt();
                        else if (rand < 0.8) enemy = spawnShooter();
                        else enemy = spawnZigzagger();
                    } else if (gameState.level === 3) {
                        if (rand < 0.4) enemy = spawnGrunt();
                        else if (rand < 0.6) enemy = spawnShooter();
                        else if (rand < 0.8) enemy = spawnZigzagger();
                        else enemy = spawnLaserDrone();
                    } else if (gameState.level === 4) {
                        if (rand < 0.3) enemy = spawnGrunt();
                        else if (rand < 0.5) enemy = spawnShooter();
                        else if (rand < 0.65) enemy = spawnZigzagger();
                        else if (rand < 0.85) enemy = spawnLaserDrone();
                        else enemy = spawnTank();
                    } else {
                        if (rand < 0.25) enemy = spawnGrunt();
                        else if (rand < 0.4) enemy = spawnShooter();
                        else if (rand < 0.55) enemy = spawnZigzagger();
                        else if (rand < 0.75) enemy = spawnLaserDrone();
                        else enemy = spawnTank();
                    }

                    if (enemy) gameState.enemies.push(enemy);
                }, i * 300);
            }
        }

        function spawnGrunt() {
            return {
                type: 'GRUNT',
                x: Math.random() * (CANVAS_WIDTH - 24),
                y: GAME_AREA_TOP - 20,
                width: 24,
                height: 16,
                hp: 30,
                maxHp: 30,
                speed: 1.5 + gameState.level * 0.3,
                vx: 0,
                vy: 1.5 + gameState.level * 0.3,
                color: '#00ff00',
                lastShotTime: 0
            };
        }

        function spawnShooter() {
            return {
                type: 'SHOOTER',
                x: Math.random() * (CANVAS_WIDTH - 28),
                y: GAME_AREA_TOP - 30,
                width: 28,
                height: 20,
                hp: 60,
                maxHp: 60,
                speed: 1.2,
                vx: Math.random() > 0.5 ? 1.2 : -1.2,
                vy: 0.8,
                color: '#ff4400',
                lastShotTime: 0,
                shootInterval: 2
            };
        }

        function spawnZigzagger() {
            return {
                type: 'ZIGZAGGER',
                x: Math.random() * (CANVAS_WIDTH - 18),
                y: GAME_AREA_TOP - 20,
                width: 18,
                height: 18,
                hp: 25,
                maxHp: 25,
                speed: 3,
                vx: Math.random() > 0.5 ? 3 : -3,
                vy: 1.5,
                color: '#ff00ff',
                zigTime: 0,
                diveTime: 0
            };
        }

        function spawnLaserDrone() {
            return {
                type: 'LASER_DRONE',
                x: Math.random() * (CANVAS_WIDTH - 20),
                y: GAME_AREA_TOP - 40,
                width: 20,
                height: 20,
                hp: 80,
                maxHp: 80,
                speed: 0.5,
                vx: Math.random() > 0.5 ? 0.5 : -0.5,
                vy: 0.5,
                color: '#00ffff',
                lastShotTime: 0,
                chargeTime: 1.5,
                chargeDuration: 0.5,
                charging: false
            };
        }

        function spawnTank() {
            return {
                type: 'TANK',
                x: Math.random() * (CANVAS_WIDTH - 40),
                y: GAME_AREA_TOP - 50,
                width: 40,
                height: 30,
                hp: 300,
                maxHp: 300,
                speed: 0.5,
                vx: Math.random() > 0.5 ? 0.5 : -0.5,
                vy: 0.3,
                color: '#4444ff',
                lastShotTime: 0,
                shootInterval: 1.5
            };
        }

        function completeLevel() {
            if (gameState.level >= MAX_LEVEL) {
                gameState.currentState = GAME_STATES.VICTORY;
                if (gameState.score > gameState.highScore) {
                    gameState.highScore = gameState.score;
                    localStorage.setItem('phantomFighterHighScore', gameState.highScore);
                }
                return;
            }
            gameState.currentState = GAME_STATES.LEVEL_COMPLETE;
            gameState.levelCompleteFlashTime = 2;
            gameState.level++;
            gameState.wave = 0;
            gameState.maxWaves = 3;
            gameState.wavePending = false;
        }

        // ============================================
        // UPDATE FUNCTIONS
        // ============================================
        function update(deltaTime) {
            if (gameState.currentState === GAME_STATES.INTRO) return;

            if (gameState.currentState === GAME_STATES.LEVEL_COMPLETE) {
                gameState.levelCompleteFlashTime -= deltaTime;
                if (gameState.levelCompleteFlashTime <= 0) {
                    gameState.currentState = GAME_STATES.PLAYING;
                    gameState.playerX = CANVAS_WIDTH / 2;
                    gameState.shieldHealth = gameState.maxShield;
                    gameState.enemies = [];
                    gameState.bullets = [];
                    gameState.explosionZones = [];
                    spawnWave();
                }
                return;
            }

            if (gameState.currentState !== GAME_STATES.PLAYING) return;

            // Update player position based on hand tracking
            if (gameState.handState.detected) {
                gameState.playerX = lerp(gameState.playerX, gameState.handState.x, 0.2);
            }
            gameState.playerX = Math.max(gameState.playerWidth / 2, Math.min(CANVAS_WIDTH - gameState.playerWidth / 2, gameState.playerX));

            // Update invincibility timer (granted on respawn)
            if (gameState.invincible) {
                gameState.respawnTimer -= deltaTime;
                if (gameState.respawnTimer <= 0) {
                    gameState.invincible = false;
                    gameState.respawnTimer = 0;
                }
            }

            // Update weapon and firing
            const currentTime = Date.now() / 1000;
            const gesture = gameState.handState.gesture;

            // Select weapon based on gesture
            if (gesture === GESTURE_ONE) {
                gameState.currentWeapon = WEAPONS.VULCAN;
            } else if (gesture === GESTURE_TWO && gameState.infernoActive) {
                gameState.currentWeapon = WEAPONS.INFERNO;
            } else if (gesture === GESTURE_THREE && gameState.novaActive) {
                gameState.currentWeapon = WEAPONS.NOVA;
            }

            // Fire weapon
            if (gesture !== GESTURE_NONE && currentTime - gameState.lastFireTime > gameState.fireRate) {
                if (gameState.currentWeapon === WEAPONS.VULCAN) {
                    fireVulcan();
                    gameState.lastFireTime = currentTime;
                } else if (gameState.currentWeapon === WEAPONS.NOVA && gameState.novaActive && gameState.novaBombs > 0) {
                    fireNova();
                    gameState.lastFireTime = currentTime;
                }
            }

            // Update bullets
            gameState.bullets = gameState.bullets.filter(bullet => {
                bullet.y -= bullet.vy;
                return bullet.y > GAME_AREA_TOP;
            });

            // Update enemies
            gameState.enemies.forEach(enemy => {
                updateEnemy(enemy, deltaTime);
            });

            // Update particles
            gameState.particles = gameState.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= deltaTime;
                p.vx *= 0.98;
                p.vy *= 0.98;
                return p.life > 0;
            });

            // Update boosts
            gameState.boosts = gameState.boosts.filter(boost => {
                boost.y += boost.vy;
                return boost.y < GAME_AREA_BOTTOM;
            });

            // Collision detection: bullets vs enemies
            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                const bullet = gameState.bullets[i];
                if (bullet.isNova) continue; // Nova bombs handled separately
                let hit = false;

                for (let j = gameState.enemies.length - 1; j >= 0; j--) {
                    const enemy = gameState.enemies[j];
                    if (rectCollision(bullet.x, bullet.y, bullet.w, bullet.h,
                        enemy.x - enemy.width / 2, enemy.y - enemy.height / 2,
                        enemy.width, enemy.height)) {

                        enemy.hp -= bullet.damage;
                        hit = true;

                        if (enemy.hp <= 0) {
                            scoreEnemy(enemy);
                            createExplosion(enemy.x, enemy.y, 12);
                            playExplosionSound();

                            // Drop boost
                            if (Math.random() < 0.25) {
                                const boostType = Math.random();
                                if (boostType < 0.4 && !gameState.infernoActive) {
                                    gameState.boosts.push({
                                        x: enemy.x,
                                        y: enemy.y,
                                        type: 'INFERNO',
                                        size: 16,
                                        vy: 1.5,
                                        color: '#ff6600'
                                    });
                                } else if (boostType < 0.7 && !gameState.novaActive) {
                                    gameState.boosts.push({
                                        x: enemy.x,
                                        y: enemy.y,
                                        type: 'NOVA',
                                        size: 16,
                                        vy: 1.5,
                                        color: '#ff00ff'
                                    });
                                } else if (boostType < 0.85) {
                                    gameState.boosts.push({
                                        x: enemy.x,
                                        y: enemy.y,
                                        type: 'SHIELD',
                                        size: 14,
                                        vy: 1.5,
                                        color: '#0088ff'
                                    });
                                } else {
                                    gameState.boosts.push({
                                        x: enemy.x,
                                        y: enemy.y,
                                        type: 'LIFE',
                                        size: 14,
                                        vy: 1.5,
                                        color: '#ff0000'
                                    });
                                }
                            }

                            gameState.enemies.splice(j, 1);
                        }
                        break;
                    }
                }

                if (hit) gameState.bullets.splice(i, 1);
            }

            // Collision detection: player vs boosts
            gameState.boosts = gameState.boosts.filter(boost => {
                const px = gameState.playerX;
                const py = gameState.playerY;
                const dist = distance(px, py, boost.x, boost.y);

                if (dist < 30) {
                    if (boost.type === 'INFERNO' && !gameState.infernoActive) {
                        gameState.infernoActive = true;
                        gameState.infernoFuel = gameState.infernoMaxFuel;
                        playPowerUpSound();
                    } else if (boost.type === 'NOVA' && !gameState.novaActive) {
                        gameState.novaActive = true;
                        gameState.novaBombs = gameState.novaMaxBombs;
                        playPowerUpSound();
                    } else if (boost.type === 'SHIELD') {
                        gameState.shieldHealth = Math.min(gameState.maxShield, gameState.shieldHealth + 3);
                        playPowerUpSound();
                    } else if (boost.type === 'LIFE') {
                        gameState.lives = Math.min(5, gameState.lives + 1);
                        playPowerUpSound();
                    }
                    return false;
                }
                return true;
            });

            // Collision detection: player vs enemy bullets
            gameState.enemies.forEach(enemy => {
                if (enemy.bullets) {
                    enemy.bullets = enemy.bullets.filter(bullet => {
                        const px = gameState.playerX;
                        const py = gameState.playerY;
                        const dist = distance(px, py, bullet.x, bullet.y);

                        if (dist < 20) {
                            if (!gameState.invincible) {
                                gameState.shieldHealth--;
                                createExplosion(px, py, 8);
                                playHitSound();
                                gameState.screenShake = 0.3;
                                gameState.shakeIntensity = 5;

                                if (gameState.shieldHealth <= 0) {
                                    gameState.lives--;
                                    if (gameState.lives <= 0) {
                                        endGame();
                                    } else {
                                        gameState.shieldHealth = gameState.maxShield;
                                        gameState.invincible = true;
                                        gameState.respawnTimer = 2;
                                    }
                                }
                            }
                            return false;
                        }
                        return true;
                    });
                }
            });

            // Collision detection: player vs enemies
            gameState.enemies.forEach(enemy => {
                const dist = distance(gameState.playerX, gameState.playerY,
                    enemy.x, enemy.y);

                if (dist < 30) {
                    if (!gameState.invincible) {
                        gameState.shieldHealth -= 2;
                        createExplosion(gameState.playerX, gameState.playerY, 10);
                        playHitSound();
                        gameState.screenShake = 0.4;
                        gameState.shakeIntensity = 8;

                        if (gameState.shieldHealth <= 0) {
                            gameState.lives--;
                            if (gameState.lives <= 0) {
                                endGame();
                            } else {
                                gameState.shieldHealth = gameState.maxShield;
                                gameState.invincible = true;
                                gameState.respawnTimer = 2;
                            }
                        }
                    }
                }
            });

            // ---- INFERNO BEAM (continuous while gesture 2 held + fuel > 0) ----
            gameState.infernoBeamActive = false;
            if (gesture === GESTURE_TWO && gameState.infernoActive && gameState.infernoFuel > 0) {
                gameState.infernoBeamActive = true;
                // Instant-kill all enemies in the beam's path
                const beamX = gameState.playerX;
                gameState.enemies.forEach(e => {
                    if (Math.abs(e.x - beamX) < (e.width / 2 + 15)) {
                        e.hp = 0;
                    }
                });
                // Deplete fuel (8 seconds total)
                gameState.infernoFuel -= deltaTime;
                if (gameState.infernoFuel <= 0) {
                    gameState.infernoFuel = gameState.infernoMaxFuel;
                    gameState.infernoActive = false;
                    gameState.infernoBeamActive = false;
                }
            }

            // ---- NOVA BOMB DETONATION (contact with enemy or 3s timeout) ----
            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                const bullet = gameState.bullets[i];
                if (!bullet.isNova) continue;
                let detonated = false;
                const age = (Date.now() - bullet.createdAt) / 1000;
                if (age >= 3) detonated = true;
                if (!detonated) {
                    for (let j = 0; j < gameState.enemies.length; j++) {
                        const e = gameState.enemies[j];
                        if (Math.hypot(e.x - bullet.x, e.y - bullet.y) < e.width / 2 + 15) {
                            detonated = true;
                            break;
                        }
                    }
                }
                if (detonated) {
                    detonateNovaBomb(bullet.x, bullet.y);
                    gameState.bullets.splice(i, 1);
                }
            }

            // ---- EXPLOSION ZONES UPDATE ----
            gameState.explosionZones.forEach(zone => {
                zone.age += deltaTime;
                if (zone.age < 0.5) {
                    zone.radius = 30 + (zone.maxRadius - 30) * (zone.age / 0.5);
                } else {
                    zone.radius = zone.maxRadius;
                }
                if (zone.age >= zone.maxAge) zone.alive = false;
                // Kill enemies inside the zone
                gameState.enemies.forEach(e => {
                    if (Math.hypot(e.x - zone.x, e.y - zone.y) < zone.radius + e.width / 2) {
                        e.hp = 0;
                    }
                });
            });
            gameState.explosionZones = gameState.explosionZones.filter(z => z.alive);

            // ---- CLEAN UP ENEMIES KILLED BY BEAM / ZONES ----
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                if (enemy.hp <= 0) {
                    scoreEnemy(enemy);
                    createExplosion(enemy.x, enemy.y, 12);
                    playExplosionSound();
                    if (Math.random() < 0.25) {
                        const boostType = Math.random();
                        if (boostType < 0.4 && !gameState.infernoActive) {
                            gameState.boosts.push({ x: enemy.x, y: enemy.y, type: 'INFERNO', size: 16, vy: 1.5, color: '#ff6600' });
                        } else if (boostType < 0.7 && !gameState.novaActive) {
                            gameState.boosts.push({ x: enemy.x, y: enemy.y, type: 'NOVA', size: 16, vy: 1.5, color: '#ff00ff' });
                        } else if (boostType < 0.85) {
                            gameState.boosts.push({ x: enemy.x, y: enemy.y, type: 'SHIELD', size: 14, vy: 1.5, color: '#0088ff' });
                        } else {
                            gameState.boosts.push({ x: enemy.x, y: enemy.y, type: 'LIFE', size: 14, vy: 1.5, color: '#ff0000' });
                        }
                    }
                    gameState.enemies.splice(i, 1);
                }
            }

            // Check level completion / next wave
            // Only act when enemies are cleared and no wave spawn is already pending.
            // wavePending prevents this block from firing every frame while the
            // staggered spawn timeouts are still queuing enemies.
            if (gameState.enemies.length === 0 && !gameState.wavePending) {
                gameState.wavePending = true;
                setTimeout(() => {
                    gameState.wavePending = false;
                    if (gameState.wave >= gameState.maxWaves) {
                        // All waves exhausted and screen is clear → level done
                        completeLevel();
                    } else {
                        spawnWave();
                    }
                }, 500);
            }

            // Update screen shake
            if (gameState.screenShake > 0) {
                gameState.screenShake -= deltaTime;
            }

            // Update city scroll
            gameState.cityScrollPos = (gameState.cityScrollPos + 1) % 100;
        }

        function updateEnemy(enemy, deltaTime) {
            enemy.vy = Math.min(3, enemy.vy + 0.5 * deltaTime);

            if (enemy.type === 'SHOOTER') {
                enemy.x += enemy.vx;
                if (enemy.x < 0 || enemy.x > CANVAS_WIDTH) enemy.vx *= -1;

                enemy.lastShotTime += deltaTime;
                if (enemy.lastShotTime >= enemy.shootInterval) {
                    enemy.bullets = enemy.bullets || [];
                    enemy.bullets.push({
                        x: enemy.x,
                        y: enemy.y,
                        vx: 0,
                        vy: 2.5,
                        size: 6,
                        color: '#ff4444'
                    });
                    enemy.lastShotTime = 0;
                }
            } else if (enemy.type === 'ZIGZAGGER') {
                enemy.zigTime += deltaTime;
                enemy.x += Math.sin(enemy.zigTime * 3) * 2;

                enemy.diveTime += deltaTime;
                if (enemy.diveTime > 2) {
                    enemy.vy = 4;
                    if (enemy.diveTime > 3) enemy.diveTime = 0;
                }
            } else if (enemy.type === 'LASER_DRONE') {
                enemy.x += enemy.vx;
                if (enemy.x < 0 || enemy.x > CANVAS_WIDTH) enemy.vx *= -1;

                enemy.lastShotTime += deltaTime;
                if (!enemy.charging && enemy.lastShotTime >= 3) {
                    enemy.charging = true;
                    enemy.chargeStart = Date.now() / 1000;
                }

                if (enemy.charging) {
                    const chargeElapsed = Date.now() / 1000 - enemy.chargeStart;
                    if (chargeElapsed >= enemy.chargeTime) {
                        enemy.bullets = enemy.bullets || [];
                        const laserStart = Date.now() / 1000;
                        enemy.bullets.push({
                            x: enemy.x,
                            y: enemy.y,
                            vx: 0,
                            vy: 4,
                            size: 4,
                            color: '#00ffff',
                            damage: 40,
                            laserStart: laserStart,
                            laserDuration: 0.5
                        });
                        enemy.charging = false;
                        enemy.lastShotTime = 0;
                    }
                }
            } else if (enemy.type === 'TANK') {
                enemy.x += enemy.vx;
                if (enemy.x < 20 || enemy.x > CANVAS_WIDTH - 20) enemy.vx *= -1;

                enemy.lastShotTime += deltaTime;
                if (enemy.lastShotTime >= enemy.shootInterval) {
                    enemy.bullets = enemy.bullets || [];
                    for (let i = -1; i <= 1; i++) {
                        enemy.bullets.push({
                            x: enemy.x + i * 8,
                            y: enemy.y,
                            vx: i * 1.5,
                            vy: 2,
                            size: 6,
                            color: '#ff6666'
                        });
                    }
                    enemy.lastShotTime = 0;
                }
            }

            enemy.y += enemy.vy;

            // Wraparound: enemies that scroll past the bottom reappear at the top (Galaga style)
            if (enemy.y > CANVAS_HEIGHT + enemy.height) {
                enemy.y = -enemy.height - 10;  // reappear just above the top
                enemy.x = Math.random() * (CANVAS_WIDTH - 60) + 30; // randomize X so they don't stack
            }
            // Horizontal wraparound for enemies that drift off the side edges
            if (enemy.x < -enemy.width) enemy.x = CANVAS_WIDTH + enemy.width;
            if (enemy.x > CANVAS_WIDTH + enemy.width) enemy.x = -enemy.width;

            // Update enemy bullets — bullets do NOT wrap, only enemies do
            if (enemy.bullets) {
                enemy.bullets = enemy.bullets.filter(b => b.y < CANVAS_HEIGHT && b.y > 0);
            }
        }

        function fireVulcan() {
            playFireSound();
            gameState.bullets.push({
                x: gameState.playerX,
                y: gameState.playerY - 15,
                vy: 8,
                w: 4,
                h: 10,
                damage: 10,
                color: '#ffff00'
            });
        }

        function fireInferno() {
            playFireSound();
            const particleCount = 15;
            for (let i = 0; i < particleCount; i++) {
                const angle = (i / particleCount) * Math.PI * 0.5 - Math.PI * 0.25;
                const speed = 3 + Math.random() * 2;
                gameState.particles.push({
                    x: gameState.playerX,
                    y: gameState.playerY - 15,
                    vx: Math.sin(angle) * speed,
                    vy: -Math.cos(angle) * speed,
                    life: 0.4,
                    size: 6,
                    color: '#ff6600',
                    damage: 2
                });
            }
        }

        function fireNova() {
            playFireSound();
            gameState.bullets.push({
                x: gameState.playerX,
                y: gameState.playerY - 20,
                vy: 3,
                w: 20,
                h: 20,
                damage: 0,
                color: '#ff00ff',
                isNova: true,
                life: 3,
                maxLife: 3,
                createdAt: Date.now()
            });
            gameState.novaBombs--;
        }

        function detonateNovaBomb(x, y) {
            gameState.explosionZones.push({
                x: x,
                y: y,
                radius: 30,
                maxRadius: 180,
                age: 0,
                maxAge: 2.0,
                alive: true
            });
            gameState.screenShake = 0.4;
            gameState.shakeIntensity = 10;
            beep(60, 0.6, 'sawtooth');
            setTimeout(() => beep(80, 0.4, 'sawtooth'), 80);
        }

        function createExplosion(x, y, particleCount) {
            for (let i = 0; i < particleCount; i++) {
                const angle = (Math.random() * Math.PI * 2);
                const speed = 2 + Math.random() * 3;
                gameState.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.5 + Math.random() * 0.3,
                    size: 3 + Math.random() * 4,
                    color: '#ffff00'
                });
            }
        }

        function drawInfernoBeam(shipX, shipY) {
            const flicker = Math.sin(Date.now() * 0.05) * 2;
            const bw = 10 + flicker;

            // Outer glow
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ff4400';
            ctx.strokeStyle = 'rgba(255, 100, 0, 0.3)';
            ctx.lineWidth = bw * 3;
            ctx.beginPath();
            ctx.moveTo(shipX, shipY);
            ctx.lineTo(shipX, 0);
            ctx.stroke();

            // Mid glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff8800';
            ctx.strokeStyle = 'rgba(255, 180, 0, 0.6)';
            ctx.lineWidth = bw * 1.5;
            ctx.beginPath();
            ctx.moveTo(shipX, shipY);
            ctx.lineTo(shipX, 0);
            ctx.stroke();

            // Core beam
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ffffff';
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = bw * 0.5;
            ctx.beginPath();
            ctx.moveTo(shipX, shipY);
            ctx.lineTo(shipX, 0);
            ctx.stroke();

            // Heat distortion: overlapping lines with slight X offsets
            ctx.shadowBlur = 0;
            for (let d = -2; d <= 2; d++) {
                if (d === 0) continue;
                ctx.strokeStyle = `rgba(255, ${80 + Math.abs(d) * 30}, 0, 0.15)`;
                ctx.lineWidth = bw * 0.4;
                ctx.beginPath();
                ctx.moveTo(shipX + d * 3, shipY);
                ctx.lineTo(shipX + d * 3, 0);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawExplosionZones() {
            gameState.explosionZones.forEach(zone => {
                const t = zone.age / zone.maxAge;
                const alpha = 1 - t * 0.7;
                const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.015);

                ctx.save();
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#ff00ff';

                // Outer ring
                ctx.beginPath();
                ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 0, 255, ${alpha * pulse})`;
                ctx.lineWidth = 4;
                ctx.stroke();

                // Inner fill (very faint)
                ctx.beginPath();
                ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 0, 255, ${alpha * 0.08})`;
                ctx.fill();

                // Second ring (slightly smaller, offset phase)
                ctx.beginPath();
                ctx.arc(zone.x, zone.y, zone.radius * 0.7, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.4})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            });
        }

        function scoreEnemy(enemy) {
            let points = 0;
            if (enemy.type === 'GRUNT') points = 50;
            else if (enemy.type === 'SHOOTER') points = 100;
            else if (enemy.type === 'ZIGZAGGER') points = 75;
            else if (enemy.type === 'LASER_DRONE') points = 150;
            else if (enemy.type === 'TANK') points = 300;

            gameState.score += points;
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('phantomFighterHighScore', gameState.highScore);
            }
        }

        function endGame() {
            gameState.currentState = GAME_STATES.GAME_OVER;
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('phantomFighterHighScore', gameState.highScore);
            }
        }

        // ============================================
        // DRAWING FUNCTIONS
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function drawBackground() {
            // Dark sky gradient
            const gradient = ctx.createLinearGradient(0, GAME_AREA_TOP, 0, GAME_AREA_BOTTOM);
            gradient.addColorStop(0, '#1a0033');
            gradient.addColorStop(1, '#0a0a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, GAME_AREA_TOP, CANVAS_WIDTH, GAME_AREA_HEIGHT);

            // Draw scrolling city grid
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 1;
            const gridSize = 80;

            for (let y = GAME_AREA_TOP - gameState.cityScrollPos; y < GAME_AREA_BOTTOM + gridSize; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
                ctx.stroke();
            }

            // Draw building blocks
            ctx.fillStyle = '#1a1a5e';
            for (let i = 0; i < 4; i++) {
                const y = GAME_AREA_TOP + (i * gridSize) - gameState.cityScrollPos;
                ctx.fillRect(40, y, 100, 60);
                ctx.fillRect(200, y + 10, 120, 50);
                ctx.fillRect(450, y + 5, 110, 55);
                ctx.fillRect(650, y + 15, 100, 50);
            }

            // Draw neon streets
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            for (let y = GAME_AREA_TOP + 75 - gameState.cityScrollPos; y < GAME_AREA_BOTTOM + gridSize; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
                ctx.stroke();
            }

            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 2;
            for (let x = 150; x < CANVAS_WIDTH; x += 220) {
                ctx.beginPath();
                ctx.moveTo(x, GAME_AREA_TOP);
                ctx.lineTo(x, GAME_AREA_BOTTOM);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            // Blink the ship every 150ms while invincible
            if (gameState.invincible && Math.floor(Date.now() / 150) % 2 === 0) return;

            const x = gameState.playerX;
            const y = gameState.playerY;

            // Engine glow
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(x, y + 15, 12 + Math.sin(Date.now() / 100) * 2, 0, Math.PI * 2);
            ctx.fill();

            // Main body (triangle)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(x, y - 20);
            ctx.lineTo(x - 12, y + 15);
            ctx.lineTo(x + 12, y + 15);
            ctx.closePath();
            ctx.fill();

            // Wings (blue accent)
            ctx.fillStyle = '#0088ff';
            ctx.fillRect(x - 16, y, 4, 12);
            ctx.fillRect(x + 12, y, 4, 12);

            // Cockpit
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(x - 4, y - 8, 8, 8);

            // Engine glow effect
            if (gameState.currentWeapon === WEAPONS.VULCAN ||
                (gameState.currentWeapon === WEAPONS.INFERNO && gameState.infernoActive)) {
                ctx.fillStyle = 'rgba(255, 255, 0, 0.6)';
                ctx.beginPath();
                ctx.arc(x, y + 18, 6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawBullets() {
            gameState.bullets.forEach(bullet => {
                if (bullet.isNova) {
                    // Nova bomb - pulsing magenta orb (detonation handled in update)
                    const pulse = Math.sin(Date.now() / 100) * 0.3 + 0.7;
                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ff00ff';
                    ctx.fillStyle = `rgba(255, 0, 255, ${pulse})`;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.restore();
                } else {
                    // Vulcan bullets
                    ctx.fillStyle = bullet.color;
                    ctx.fillRect(bullet.x - bullet.w / 2, bullet.y, bullet.w, bullet.h);
                }
            });
        }

        function drawEnemies() {
            gameState.enemies.forEach(enemy => {
                const x = enemy.x;
                const y = enemy.y;

                if (enemy.type === 'GRUNT') {
                    // Green insect shape
                    ctx.fillStyle = enemy.color;
                    ctx.fillRect(x - 8, y - 5, 16, 10);
                    ctx.beginPath();
                    ctx.arc(x - 10, y - 3, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + 10, y - 3, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else if (enemy.type === 'SHOOTER') {
                    // Red diamond shape
                    ctx.fillStyle = enemy.color;
                    ctx.beginPath();
                    ctx.moveTo(x, y - 10);
                    ctx.lineTo(x + 14, y);
                    ctx.lineTo(x, y + 10);
                    ctx.lineTo(x - 14, y);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.type === 'ZIGZAGGER') {
                    // Magenta arrowhead
                    ctx.fillStyle = enemy.color;
                    ctx.beginPath();
                    ctx.moveTo(x, y - 9);
                    ctx.lineTo(x + 9, y + 4);
                    ctx.lineTo(x, y + 1);
                    ctx.lineTo(x - 9, y + 4);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.type === 'LASER_DRONE') {
                    // Cyan circular drone
                    ctx.fillStyle = enemy.color;
                    ctx.beginPath();
                    ctx.arc(x, y, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#00ffff';
                    ctx.fillRect(x - 12, y - 3, 5, 6);
                    ctx.fillRect(x + 7, y - 3, 5, 6);

                    // Charging indicator
                    if (enemy.charging) {
                        ctx.strokeStyle = '#ffff00';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(x, y, 13, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                } else if (enemy.type === 'TANK') {
                    // Heavy armored tank
                    ctx.fillStyle = enemy.color;
                    ctx.fillRect(x - 20, y - 12, 40, 24);
                    ctx.fillStyle = '#5555ff';
                    ctx.fillRect(x - 8, y - 8, 16, 10);
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath();
                    ctx.arc(x, y - 3, 3, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw enemy bullets
                if (enemy.bullets) {
                    enemy.bullets.forEach(bullet => {
                        ctx.fillStyle = bullet.color;
                        ctx.fillRect(bullet.x - bullet.size / 2, bullet.y - bullet.size / 2, bullet.size, bullet.size);
                    });
                }

                // Draw HP bar
                const barWidth = 30;
                const barHeight = 3;
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(x - barWidth / 2, y - 20, barWidth, barHeight);
                ctx.fillStyle = '#00ff00';
                const hpPercent = enemy.hp / enemy.maxHp;
                ctx.fillRect(x - barWidth / 2, y - 20, barWidth * hpPercent, barHeight);
            });
        }

        function drawParticles() {
            gameState.particles.forEach(particle => {
                ctx.save();
                ctx.globalAlpha = particle.life / (particle.life + 0.1);
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function drawBoosts() {
            gameState.boosts.forEach(boost => {
                ctx.save();
                ctx.fillStyle = boost.color;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;

                if (boost.type === 'INFERNO' || boost.type === 'NOVA') {
                    // Star shape
                    drawStar(boost.x, boost.y, 5, boost.size, boost.size * 0.4);
                } else {
                    // Circle
                    ctx.beginPath();
                    ctx.arc(boost.x, boost.y, boost.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.restore();
            });
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                rot += step;
                ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        function drawHUD() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, HUD_HEIGHT);
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, CANVAS_WIDTH, HUD_HEIGHT);

            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 12px "Press Start 2P"';
            ctx.fillText(`SCORE: ${gameState.score}`, 20, 25);
            ctx.fillText(`LEVEL: ${gameState.level}`, 320, 25);

            // Draw lives
            const lifeY = 15;
            for (let i = 0; i < gameState.lives; i++) {
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(650 + i * 20, lifeY, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw shield segments
            const shieldX = 710;
            for (let i = 0; i < gameState.maxShield; i++) {
                ctx.strokeStyle = i < gameState.shieldHealth ? '#0088ff' : '#004488';
                ctx.lineWidth = 2;
                ctx.fillStyle = i < gameState.shieldHealth ? 'rgba(0, 136, 255, 0.3)' : 'rgba(0, 136, 255, 0.1)';
                ctx.fillRect(shieldX + i * 12, 10, 10, 20);
                ctx.strokeRect(shieldX + i * 12, 10, 10, 20);
            }
        }

        function drawBottomHUD() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, GAME_AREA_BOTTOM, CANVAS_WIDTH, BOTTOM_HUD_HEIGHT);
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, GAME_AREA_BOTTOM, CANVAS_WIDTH, BOTTOM_HUD_HEIGHT);

            // Weapon status
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 10px "Press Start 2P"';
            const weaponY = GAME_AREA_BOTTOM + 20;

            ctx.fillStyle = gameState.currentWeapon === WEAPONS.VULCAN ? '#ffff00' : '#00ff00';
            ctx.fillText('VULCAN', 20, weaponY);

            if (gameState.infernoActive) {
                ctx.fillStyle = gameState.currentWeapon === WEAPONS.INFERNO ? '#ff6600' : '#ff3300';
                ctx.fillText('INFERNO', 130, weaponY);
                ctx.fillStyle = '#ffff00';
                ctx.fillText(`${gameState.infernoFuel.toFixed(1)}s`, 130, weaponY + 15);
            }

            if (gameState.novaActive) {
                ctx.fillStyle = gameState.currentWeapon === WEAPONS.NOVA ? '#ff00ff' : '#ff0088';
                ctx.fillText('NOVA', 260, weaponY);
                ctx.fillStyle = '#ffff00';
                ctx.fillText(`${gameState.novaBombs}/${gameState.novaMaxBombs}`, 260, weaponY + 15);
            }

            // Hand preview window
            const previewX = 600;
            const previewY = GAME_AREA_BOTTOM + 10;
            const previewW = 180;
            const previewH = 60;

            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(previewX, previewY, previewW, previewH);
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(previewX + 1, previewY + 1, previewW - 2, previewH - 2);

            ctx.fillStyle = '#00ffff';
            ctx.font = 'bold 8px "Press Start 2P"';
            ctx.fillText('GESTURE', previewX + 10, previewY + 12);

            if (gameState.handState.detected && gameState.handState.landmarks) {
                const scale = (previewW - 20) / 0.4;
                const offsetX = previewX + 10;
                const offsetY = previewY + 22;

                // Draw hand landmarks
                const landmarks = gameState.handState.landmarks;
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 1;

                // Draw connections
                const connections = [
                    [0, 1], [1, 2], [2, 3], [3, 4],
                    [0, 5], [5, 6], [6, 7], [7, 8],
                    [0, 9], [9, 10], [10, 11], [11, 12],
                    [0, 13], [13, 14], [14, 15], [15, 16],
                    [0, 17], [17, 18], [18, 19], [19, 20]
                ];

                connections.forEach(([from, to]) => {
                    const l1 = landmarks[from];
                    const l2 = landmarks[to];
                    ctx.beginPath();
                    ctx.moveTo(offsetX + l1.x * scale, offsetY + l1.y * scale);
                    ctx.lineTo(offsetX + l2.x * scale, offsetY + l2.y * scale);
                    ctx.stroke();
                });

                // Draw landmarks
                ctx.fillStyle = '#ffffff';
                landmarks.forEach(landmark => {
                    ctx.beginPath();
                    ctx.arc(offsetX + landmark.x * scale, offsetY + landmark.y * scale, 2, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Draw gesture label
                let gestureLabel = 'NONE';
                if (gameState.handState.gesture === GESTURE_ONE) gestureLabel = 'VULCAN';
                else if (gameState.handState.gesture === GESTURE_TWO) gestureLabel = 'INFERNO';
                else if (gameState.handState.gesture === GESTURE_THREE) gestureLabel = 'NOVA';

                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 7px "Press Start 2P"';
                ctx.fillText(gestureLabel, previewX + 70, previewY + 55);
            } else {
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 8px "Press Start 2P"';
                ctx.fillText('NO HAND', previewX + 20, previewY + 35);
            }
        }

        function drawLevelComplete() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.fillStyle = '#00ffff';
            ctx.font = 'bold 32px "Press Start 2P"';
            const text = `LEVEL ${gameState.level - 1} COMPLETE!`;
            const textWidth = ctx.measureText(text).width;
            ctx.fillText(text, (CANVAS_WIDTH - textWidth) / 2, CANVAS_HEIGHT / 2);
        }

        function drawGameOver() {
            // Dark overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.82)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.textAlign = 'center';

            // GAME OVER title with glow
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 38px "Press Start 2P"';
            ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 195);
            ctx.shadowBlur = 0;

            // Score
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 16px "Press Start 2P"';
            ctx.fillText(`SCORE: ${gameState.score}`, CANVAS_WIDTH / 2, 270);

            // High score
            ctx.fillStyle = '#00ff00';
            ctx.fillText(`HIGH SCORE: ${gameState.highScore}`, CANVAS_WIDTH / 2, 312);

            // PLAY AGAIN button (glowing rectangle)
            const btnX = CANVAS_WIDTH / 2 - 135;
            const btnY = 362;
            const btnW = 270;
            const btnH = 56;

            ctx.shadowColor = '#ff4400';
            ctx.shadowBlur = 22;
            ctx.fillStyle = 'rgba(200, 30, 0, 0.28)';
            ctx.fillRect(btnX, btnY, btnW, btnH);
            ctx.strokeStyle = '#ff4400';
            ctx.lineWidth = 3;
            ctx.strokeRect(btnX, btnY, btnW, btnH);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px "Press Start 2P"';
            ctx.fillText('PLAY AGAIN', CANVAS_WIDTH / 2, btnY + 35);

            ctx.textAlign = 'left';

            // Store button bounds for click detection
            gameState.playAgainBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
        }

        function drawVictory() {
            // Dark overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.82)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.textAlign = 'center';

            // VICTORY title with glow
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#00ffff';
            ctx.font = 'bold 38px "Press Start 2P"';
            ctx.fillText('VICTORY!', CANVAS_WIDTH / 2, 195);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 14px "Press Start 2P"';
            ctx.fillText('ALL LEVELS CLEARED', CANVAS_WIDTH / 2, 240);

            // Final score
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 16px "Press Start 2P"';
            ctx.fillText(`FINAL SCORE: ${gameState.score}`, CANVAS_WIDTH / 2, 300);

            // High score
            ctx.fillStyle = '#00ff00';
            ctx.fillText(`HIGH SCORE: ${gameState.highScore}`, CANVAS_WIDTH / 2, 342);

            // PLAY AGAIN button
            const btnX = CANVAS_WIDTH / 2 - 135;
            const btnY = 390;
            const btnW = 270;
            const btnH = 56;

            ctx.shadowColor = '#00ff00';
            ctx.shadowBlur = 22;
            ctx.fillStyle = 'rgba(0, 180, 0, 0.22)';
            ctx.fillRect(btnX, btnY, btnW, btnH);
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 3;
            ctx.strokeRect(btnX, btnY, btnW, btnH);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px "Press Start 2P"';
            ctx.fillText('PLAY AGAIN', CANVAS_WIDTH / 2, btnY + 35);

            ctx.textAlign = 'left';

            // Store button bounds for click detection
            gameState.playAgainBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
        }

        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Apply screen shake
            ctx.save();
            if (gameState.screenShake > 0) {
                const shakeX = (Math.random() - 0.5) * gameState.shakeIntensity;
                const shakeY = (Math.random() - 0.5) * gameState.shakeIntensity;
                ctx.translate(shakeX, shakeY);
            }

            // Draw game elements
            drawBackground();
            drawExplosionZones(); // drawn before enemies so zones appear behind them
            drawEnemies();
            drawBullets();
            if (gameState.infernoBeamActive) drawInfernoBeam(gameState.playerX, gameState.playerY);
            drawParticles();
            drawBoosts();
            drawPlayer();
            drawHUD();
            drawBottomHUD();

            if (gameState.currentState === GAME_STATES.LEVEL_COMPLETE) {
                drawLevelComplete();
            }

            // Respawning flash text
            if (gameState.invincible && gameState.respawnTimer > 0) {
                ctx.textAlign = 'center';
                ctx.fillStyle = `rgba(255, 255, 0, ${Math.abs(Math.sin(Date.now() / 200))})`;
                ctx.font = 'bold 20px "Press Start 2P"';
                ctx.fillText('RESPAWNING...', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);
                ctx.textAlign = 'left';
            }

            if (gameState.currentState === GAME_STATES.GAME_OVER) {
                drawGameOver();
            }
            if (gameState.currentState === GAME_STATES.VICTORY) {
                drawVictory();
            }

            ctx.restore();
        }

        // ============================================
        // GAME LOOP
        // ============================================
        let lastFrameTime = Date.now();

        function gameLoop() {
            const currentTime = Date.now();
            const deltaTime = (currentTime - lastFrameTime) / 1000;
            lastFrameTime = currentTime;

            update(Math.min(deltaTime, 0.016)); // Cap at 60fps
            draw();

            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.getElementById('startButton').addEventListener('click', () => {
            initAudio();
            startCamera();
        });

        document.getElementById('playAgainButton').addEventListener('click', resetGame);

        // Canvas click handler: PLAY AGAIN button on GAME_OVER / VICTORY screens
        canvas.addEventListener('click', (e) => {
            if (gameState.currentState !== GAME_STATES.GAME_OVER &&
                gameState.currentState !== GAME_STATES.VICTORY) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = CANVAS_WIDTH / rect.width;
            const scaleY = CANVAS_HEIGHT / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            const btn = gameState.playAgainBtn;
            if (btn && x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
                resetGame();
            }
        });

        gameLoop();
    </script>
</body>
</html>
